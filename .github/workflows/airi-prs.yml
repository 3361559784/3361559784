name: Update AIRI PRs

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update merged AIRI PR list
        run: node .github/scripts/update-airi-prs.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit changes
        run: |
          if git diff --quiet README.md; then
            echo "No README changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(profile): update merged AIRI PRs"
          git push
